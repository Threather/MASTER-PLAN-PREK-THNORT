<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prek Thnort — Land Map</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0a1a0a; font-family:'Segoe UI',sans-serif; color:#e8f5e0; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#topbar {
  display:flex; align-items:center; gap:10px; padding:8px 14px;
  background:#111d11; border-bottom:1px solid #2d4a2d; flex-shrink:0; flex-wrap:wrap;
}
#topbar h1 { font-size:15px; color:#a3e635; white-space:nowrap; }
.pill {
  display:flex; align-items:center; gap:5px; background:#1a2e1a;
  border:1px solid #2d4a2d; border-radius:20px; padding:3px 10px; font-size:12px;
}
.dot { width:10px; height:10px; border-radius:2px; }
.btn {
  padding:5px 12px; border-radius:6px; border:1px solid #4a7c59;
  cursor:pointer; font-size:12px; font-family:inherit;
  background:#1a2e1a; color:#a3e635; white-space:nowrap; transition:all 0.1s;
}
.btn:hover { background:#2a4a2a; }
.btn.load { border-color:#a3e635; color:#a3e635; font-weight:700; }

#status-bar {
  padding:4px 14px; background:#0d170d; border-bottom:1px solid #1a3a1a;
  font-size:11px; color:#5a7a5a; flex-shrink:0; display:flex; align-items:center; gap:8px;
}
#db-status { display:flex; align-items:center; gap:5px; }
.db-dot { width:7px; height:7px; border-radius:50%; background:#4a7c59; }
.db-dot.connected { background:#22c55e; animation:pulse 2s infinite; }
.db-dot.error { background:#ef4444; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

#map-area { flex:1; overflow:auto; background:#0a0c12; position:relative; }
#map-wrap { position:relative; display:inline-block; transform-origin:top left; }
#bg { display:block; user-select:none; -webkit-user-drag:none; }
svg#ov { position:absolute; top:0; left:0; width:100%; height:100%; }

.pp { cursor:pointer; transition:all 0.15s; vector-effect:non-scaling-stroke; }
.pp:hover { filter:brightness(1.2); opacity:0.85; }
.pp.sel { stroke-width:3 !important; filter:brightness(1.15); }
.s-unsold   { fill:rgba(255,255,255,0.1);  stroke:rgba(255,255,255,0.55); stroke-width:1.2; }
.s-reserved { fill:rgba(251,191,36,0.5);   stroke:#f59e0b; stroke-width:1.8; }
.s-sold     { fill:rgba(239,68,68,0.6);    stroke:#ef4444; stroke-width:1.8; }

.lbl { fill:#fff; font-weight:700; text-anchor:middle; dominant-baseline:middle; paint-order:stroke; stroke:#000; stroke-width:2; pointer-events:none; font-family:'Segoe UI',sans-serif; }

/* Picker */
#picker {
  position:fixed; background:#111d11; border:1px solid #4a7c59;
  border-radius:10px; padding:10px; z-index:300; display:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.7); min-width:155px;
}
#picker-name { font-size:12px; color:#a3e635; font-weight:700; margin-bottom:8px; border-bottom:1px solid #2d4a2d; padding-bottom:6px; }
.pbtn {
  display:block; width:100%; padding:8px 10px; margin-bottom:5px;
  border-radius:6px; border:2px solid; cursor:pointer;
  font-size:12px; font-family:inherit; text-align:left; background:#0a1a0a;
  transition:all 0.1s;
}
.pbtn:last-child { margin-bottom:0; }
.pbtn:hover { opacity:0.85; }
.pbtn.cur { font-weight:700; }

/* Tooltip */
#tip {
  position:fixed; background:rgba(17,29,17,0.97); border:1px solid #4a7c59;
  padding:5px 10px; border-radius:8px; font-size:11px; color:#e8f5e0;
  pointer-events:none; z-index:200; display:none; white-space:nowrap;
}

/* Legend */
#legend {
  position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
  background:rgba(17,29,17,0.95); border:1px solid #2d4a2d;
  border-radius:20px; padding:5px 16px; display:flex; gap:14px;
  font-size:11px; z-index:100; pointer-events:none;
}
.leg { display:flex; align-items:center; gap:5px; color:#9dbc8a; }
.leg-sw { width:14px; height:10px; border-radius:2px; }

/* No plots */
#no-plots {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#111d11; border:2px dashed #4a7c59; border-radius:16px;
  padding:32px 40px; text-align:center; z-index:200;
}
#no-plots h2 { color:#a3e635; margin-bottom:10px; }
#no-plots p { color:#7a9a7a; font-size:13px; line-height:1.8; }

.zbtn { position:fixed; background:#1a2e1a; border:1px solid #4a7c59; color:#a3e635; border-radius:6px; cursor:pointer; font-size:16px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; z-index:100; }
.zbtn:hover { background:#2a4a2a; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🗺 Prek Thnort — Land Map</h1>
  <div class="pill">
    <div class="dot" style="background:rgba(255,255,255,0.4);border:1px solid #6b7280"></div>
    <span style="color:#9ca3af">Unsold</span>
    <b id="cnt-u" style="color:#e5e7eb">—</b>
  </div>
  <div class="pill">
    <div class="dot" style="background:#f59e0b"></div>
    <span style="color:#fbbf24">Reserved</span>
    <b id="cnt-r" style="color:#fbbf24">—</b>
  </div>
  <div class="pill">
    <div class="dot" style="background:#ef4444"></div>
    <span style="color:#f87171">Sold</span>
    <b id="cnt-s" style="color:#f87171">—</b>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px">
    <button class="btn load" onclick="loadPlots()">📂 Load plots.json</button>
    <button class="btn" onclick="resetAll()" style="color:#f87171;border-color:#dc2626">↺ Reset All</button>
  </div>
</div>

<div id="status-bar">
  <div id="db-status">
    <div class="db-dot" id="db-dot"></div>
    <span id="db-txt">Not connected — add Firebase config to connect</span>
  </div>
</div>

<div id="no-plots">
  <h2>📂 Load plots.json</h2>
  <p>Draw your plots in <b>editor.html</b><br>then click <b>Load plots.json</b> above.</p>
</div>

const pick = document.getElementById('picker');

const SC = {
  unsold:   { cls:'s-unsold',   label:'Unsold',   color:'#94a3b8', bg:'rgba(255,255,255,0.08)' },
  reserved: { cls:'s-reserved', label:'Reserved', color:'#f59e0b', bg:'rgba(245,158,11,0.18)'  },
  sold:     { cls:'s-sold',     label:'Sold',     color:'#ef4444', bg:'rgba(239,68,68,0.18)'   },
};

// ── Firebase init ────────────────────────────────────────
function initFirebase() {
  try {
    if (firebaseConfig.apiKey === 'YOUR_API_KEY') {
      setDbStatus(false, 'Firebase not configured — see README.md');
      return;
    }
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    dbRef = ref(db, 'plots');

    // Listen for real-time changes
    onValue(dbRef, snap => {
      const data = snap.val() || {};
      // Merge remote into local status
      Object.keys(data).forEach(id => { status[id] = data[id]; });
      renderMap();
      updateStats();
      setDbStatus(true, 'Connected — changes sync in real-time');
    }, err => {
      setDbStatus(false, 'Firebase error: ' + err.message);
    });
  } catch(e) {
    setDbStatus(false, 'Firebase error: ' + e.message);
  }
}

function setDbStatus(ok, msg) {
  const dot = document.getElementById('db-dot');
  dot.className = 'db-dot' + (ok ? ' connected' : ' error');
  document.getElementById('db-txt').textContent = msg;
}

// ── Write single plot status to Firebase ────────────────
function writeStatus(id, val) {
  if (!db) return;
  update(dbRef, { [id]: val });
}

// ── Load plots.json ──────────────────────────────────────
window.loadPlots = function() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        plots = data.plots || [];
        plots.forEach(p => { if (!status[p.id]) status[p.id] = 'unsold'; });
        document.getElementById('no-plots').style.display = 'none';
        renderMap();
        updateStats();
      } catch(err) { alert('Invalid plots.json'); }
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
};

// ── Map render ───────────────────────────────────────────
function renderMap() {
  svg.innerHTML = '';
  plots.forEach(p => {
    const st  = SC[status[p.id] || 'unsold'];
    const isSel = p.id === selId;
    const pts = p.pts.map(pt => pt.x+','+pt.y).join(' ');
    const cx  = p.pts.reduce((a,pt)=>a+pt.x,0)/p.pts.length;
    const cy  = p.pts.reduce((a,pt)=>a+pt.y,0)/p.pts.length;

    const poly = mkel('polygon');
    poly.setAttribute('points', pts);
    poly.setAttribute('class', 'pp ' + st.cls + (isSel?' sel':''));
    poly.onclick = e => { e.stopPropagation(); selId=p.id; showPicker(e,p); renderMap(); };
    poly.onmouseenter = e => {
      tip.style.display='block';
      tip.innerHTML = `<b>${p.name}</b> &nbsp;<span style="color:${st.color}">${st.label}</span>`;
    };
    poly.onmousemove  = e => { tip.style.left=(e.clientX+12)+'px'; tip.style.top=(e.clientY-8)+'px'; };
    poly.onmouseleave = () => tip.style.display='none';
    svg.appendChild(poly);

    const lbl = mkel('text');
    lbl.setAttribute('x', cx); lbl.setAttribute('y', cy);
    lbl.setAttribute('class', 'lbl');
    lbl.setAttribute('font-size', Math.max(6, 8/scale));
    lbl.textContent = p.name;
    svg.appendChild(lbl);
  });
}

// ── Picker ───────────────────────────────────────────────
function showPicker(e, p) {
  const cur = status[p.id] || 'unsold';
  document.getElementById('picker-name').textContent = p.name;
  ['u','r','s'].forEach((k,i) => {
    const s = ['unsold','reserved','sold'][i];
    const btn = document.getElementById('pb-'+k);
    btn.className = 'pbtn' + (s===cur?' cur':'');
    btn.style.background = s===cur ? SC[s].bg : '#0a1a0a';
    btn.style.fontWeight  = s===cur ? '700' : 'normal';
  });
  pick.style.display = 'block';
  let px=e.clientX+10, py=e.clientY-10;
  if(px+170>window.innerWidth)  px=e.clientX-175;
  if(py+185>window.innerHeight) py=window.innerHeight-190;
  pick.style.left=px+'px'; pick.style.top=py+'px';
}

window.setStatus = function(val) {
  if(selId===null) return;
  status[selId] = val;           // update local
  writeStatus(selId, val);       // sync to Firebase
  closePicker(); renderMap(); updateStats();
};

window.closePicker = function() {
  pick.style.display='none'; selId=null; renderMap();
};

// ── Stats ────────────────────────────────────────────────
function updateStats() {
  const c = {unsold:0,reserved:0,sold:0};
  plots.forEach(p => c[status[p.id]||'unsold']++);
  document.getElementById('cnt-u').textContent = c.unsold;
  document.getElementById('cnt-r').textContent = c.reserved;
  document.getElementById('cnt-s').textContent = c.sold;
}

// ── Reset ────────────────────────────────────────────────
window.resetAll = function() {
  if(!plots.length){ alert('No plots loaded!'); return; }
  if(!confirm('Reset ALL plots to Unsold?')) return;
  const updates = {};
  plots.forEach(p => { status[p.id]='unsold'; updates[p.id]='unsold'; });
  if(db) update(dbRef, updates);
  renderMap(); updateStats();
};

// ── Zoom ─────────────────────────────────────────────────
window.z = function(d) { setS(Math.min(5,Math.max(0.3,scale+d))); };
function setS(s) {
  scale=s;
  const wrap=document.getElementById('map-wrap');
  wrap.style.transform=`scale(${s})`;
  wrap.style.marginBottom=(H*s-H)+'px';
  wrap.style.marginRight=(W*s-W)+'px';
  renderMap();
}
window.fit = function() {
  const a=document.getElementById('map-area');
  setS(Math.min(a.clientWidth/W, a.clientHeight/H, 1));
};

document.getElementById('map-area').addEventListener('wheel',e=>{
  e.preventDefault(); window.z(e.deltaY<0?0.1:-0.1);
},{passive:false});

document.addEventListener('click', e=>{
  if(pick.style.display==='block' && !pick.contains(e.target)) window.closePicker();
});

function mkel(tag) { return document.createElementNS('http://www.w3.org/2000/svg',tag); }

window.addEventListener('load', () => { setTimeout(window.fit, 100); initFirebase(); });
</script>
</body>
</html>
